<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>Hindi for Family</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap');
    
    :root {
      --bg-deep: #0f0f1a;
      --bg-card: #1a1a2e;
      --bg-card-hover: #252542;
      --accent-warm: #ff6b35;
      --accent-gold: #f7c94b;
      --accent-coral: #ff8a5c;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b8;
      --text-muted: #6b6b80;
      --success: #4ade80;
      --radius: 16px;
      --radius-sm: 10px;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
    }
    
    .hindi {
      font-family: 'Noto Sans Devanagari', sans-serif;
    }
    
    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
      padding-bottom: 100px;
    }
    
    /* Header */
    .header {
      text-align: center;
      padding: 30px 0 40px;
      position: relative;
    }
    
    .header::before {
      content: '';
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,107,53,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .logo {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-warm), var(--accent-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    
    .tagline {
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 300;
    }
    
    /* Progress Bar */
    .progress-container {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 30px;
    }
    
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .progress-label {
      font-weight: 500;
      font-size: 0.9rem;
    }
    
    .progress-stats {
      color: var(--accent-gold);
      font-weight: 600;
      font-size: 0.9rem;
    }
    
    .progress-bar {
      height: 8px;
      background: var(--bg-deep);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-warm), var(--accent-gold));
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    
    /* Week Tabs */
    .week-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
    }
    
    .week-tabs::-webkit-scrollbar {
      display: none;
    }
    
    .week-tab {
      flex-shrink: 0;
      padding: 10px 18px;
      background: var(--bg-card);
      border: none;
      border-radius: 20px;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .week-tab:hover {
      background: var(--bg-card-hover);
    }
    
    .week-tab.active {
      background: linear-gradient(135deg, var(--accent-warm), var(--accent-coral));
      color: white;
    }
    
    /* Day Cards */
    .days-grid {
      display: grid;
      gap: 12px;
    }
    
    .day-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    
    .day-card:hover {
      background: var(--bg-card-hover);
      transform: translateY(-2px);
    }
    
    .day-card.completed {
      border-color: rgba(74, 222, 128, 0.3);
    }
    
    .day-card.locked {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .day-card.locked:hover {
      transform: none;
      background: var(--bg-card);
    }
    
    .day-icon {
      width: 48px;
      height: 48px;
      background: var(--bg-deep);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    
    .day-info {
      flex: 1;
    }
    
    .day-number {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    
    .day-title {
      font-weight: 600;
      font-size: 1rem;
    }
    
    .day-status {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
    }
    
    .day-status.completed {
      background: var(--success);
      color: var(--bg-deep);
    }
    
    .day-status.current {
      background: var(--accent-warm);
      color: white;
    }
    
    .day-status.locked {
      background: var(--bg-deep);
      color: var(--text-muted);
    }
    
    /* Lesson View */
    .lesson-view {
      display: none;
    }
    
    .lesson-view.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      padding: 10px 0;
      margin-bottom: 20px;
    }
    
    .back-btn:hover {
      color: var(--text-primary);
    }
    
    .lesson-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .lesson-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    
    .lesson-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .lesson-category {
      color: var(--accent-gold);
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    /* Phrase Cards */
    .phrases-section {
      margin-bottom: 30px;
    }
    
    .section-title {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    
    .phrase-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .phrase-card:hover {
      background: var(--bg-card-hover);
    }
    
    .phrase-card:active {
      transform: scale(0.98);
    }
    
    .phrase-main {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    
    .phrase-hindi {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .phrase-roman {
      color: var(--accent-coral);
      font-size: 1.1rem;
      font-weight: 500;
    }
    
    .phrase-speak {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent-warm), var(--accent-coral));
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    
    .phrase-speak:hover {
      transform: scale(1.1);
    }
    
    .phrase-speak:active {
      transform: scale(0.95);
    }
    
    .phrase-english {
      font-size: 1.05rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .phrase-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .phrase-pronunciation {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-style: italic;
    }
    
    .phrase-context {
      font-size: 0.8rem;
      color: var(--accent-gold);
      background: rgba(247, 201, 75, 0.1);
      padding: 4px 10px;
      border-radius: 12px;
    }
    
    /* Fun Fact */
    .fun-fact {
      background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(247,201,75,0.1));
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 30px;
      border-left: 3px solid var(--accent-gold);
    }
    
    .fun-fact-label {
      font-size: 0.75rem;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .fun-fact-text {
      color: var(--text-primary);
      font-size: 0.95rem;
      line-height: 1.6;
    }
    
    /* Practice Challenge */
    .practice-box {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 30px;
      text-align: center;
    }
    
    .practice-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    
    .practice-text {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-primary);
    }
    
    /* Quiz Section */
    .quiz-section {
      margin-bottom: 30px;
    }
    
    .quiz-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 24px;
    }
    
    .quiz-progress {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }
    
    .quiz-dot {
      flex: 1;
      height: 4px;
      background: var(--bg-deep);
      border-radius: 2px;
    }
    
    .quiz-dot.answered {
      background: var(--success);
    }
    
    .quiz-dot.current {
      background: var(--accent-warm);
    }
    
    .quiz-question {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 8px;
      text-align: center;
    }
    
    .quiz-prompt {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .quiz-options {
      display: grid;
      gap: 10px;
    }
    
    .quiz-option {
      background: var(--bg-deep);
      border: 2px solid transparent;
      border-radius: var(--radius-sm);
      padding: 16px;
      font-family: inherit;
      font-size: 1rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    
    .quiz-option:hover:not(:disabled) {
      border-color: var(--accent-warm);
    }
    
    .quiz-option.selected {
      border-color: var(--accent-warm);
      background: rgba(255,107,53,0.1);
    }
    
    .quiz-option.correct {
      border-color: var(--success);
      background: rgba(74,222,128,0.1);
    }
    
    .quiz-option.incorrect {
      border-color: #ef4444;
      background: rgba(239,68,68,0.1);
    }
    
    .quiz-option:disabled {
      cursor: default;
    }
    
    .quiz-result {
      text-align: center;
      padding: 20px 0;
    }
    
    .quiz-score {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-warm), var(--accent-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .quiz-message {
      color: var(--text-secondary);
      margin-top: 8px;
    }
    
    /* Buttons */
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-warm), var(--accent-coral));
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255,107,53,0.3);
    }
    
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-primary);
    }
    
    .btn-secondary:hover {
      background: var(--bg-card-hover);
    }
    
    /* Complete Lesson Button */
    .complete-btn {
      margin-top: 20px;
    }
    
    /* Tab Content */
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    /* Lesson Tabs */
    .lesson-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 4px;
    }
    
    .lesson-tab {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .lesson-tab.active {
      background: var(--bg-deep);
      color: var(--text-primary);
    }
    
    /* Home View */
    .home-view {
      display: block;
    }
    
    .home-view.hidden {
      display: none;
    }
    
    /* Version info */
    .version-info {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.75rem;
    }
    
    /* Responsive */
    @media (max-width: 380px) {
      .app {
        padding: 16px;
      }
      
      .phrase-hindi {
        font-size: 1.3rem;
      }
      
      .phrase-roman {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Home View -->
    <div class="home-view" id="homeView">
      <header class="header">
        <h1 class="logo">Hindi for Family</h1>
        <p class="tagline" id="tagline">30 days to conversation</p>
      </header>
      
      <div class="progress-container">
        <div class="progress-header">
          <span class="progress-label">Your Progress</span>
          <span class="progress-stats" id="progressStats">0/30 days</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
      </div>
      
      <div class="week-tabs" id="weekTabs"></div>
      
      <div class="days-grid" id="daysGrid"></div>
      
      <div class="version-info" id="versionInfo"></div>
    </div>
    
    <!-- Lesson View -->
    <div class="lesson-view" id="lessonView">
      <button class="back-btn" id="backBtn">
        <span>←</span> Back to lessons
      </button>
      
      <div class="lesson-header">
        <div class="lesson-icon" id="lessonIcon">👋</div>
        <h2 class="lesson-title" id="lessonTitle">Hello & Goodbye</h2>
        <span class="lesson-category" id="lessonCategory">Greetings</span>
      </div>
      
      <div class="lesson-tabs">
        <button class="lesson-tab active" data-tab="learn">Learn</button>
        <button class="lesson-tab" data-tab="quiz">Quiz</button>
      </div>
      
      <div class="tab-content active" id="learnTab">
        <div class="phrases-section">
          <h3 class="section-title">Today's Phrases</h3>
          <div id="phrasesList"></div>
        </div>
        
        <div class="fun-fact" id="funFact">
          <div class="fun-fact-label">💡 Fun Fact</div>
          <p class="fun-fact-text" id="funFactText"></p>
        </div>
        
        <div class="practice-box">
          <div class="practice-label">🎯 Today's Challenge</div>
          <p class="practice-text" id="practiceText"></p>
        </div>
        
        <button class="btn btn-primary complete-btn" id="startQuizBtn">
          Take the Quiz →
        </button>
      </div>
      
      <div class="tab-content" id="quizTab">
        <div class="quiz-section">
          <div class="quiz-card" id="quizCard">
            <div class="quiz-progress" id="quizProgress"></div>
            <div id="quizContent"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // COURSE CONFIGURATION
    // ==========================================
    
    const COURSE_VERSION = "2.0.0";
    const STORAGE_KEY = "hindiFamilyCourse";
    
    // ==========================================
    // LESSON DATABASE
    // Each lesson has a unique ID that NEVER changes
    // ==========================================
    
    const lessonDatabase = {
      // ===== WEEK 1: Foundations =====
      "w1-greetings-hello": {
        id: "w1-greetings-hello",
        title: "Hello & Goodbye",
        category: "Greetings",
        icon: "👋",
        phrases: [
          { hindi: "नमस्ते", roman: "Namaste", english: "Hello / Goodbye", pronunciation: "nuh-MUS-tay", context: "Any time of day!", speakText: "Namaste" },
          { hindi: "नमस्कार", roman: "Namaskar", english: "Respectful Hello", pronunciation: "nuh-mus-KAAR", context: "For elders", speakText: "Namaskar" },
          { hindi: "फिर मिलेंगे", roman: "Phir milenge", english: "See you later", pronunciation: "fir mi-LEN-gay", context: "When leaving", speakText: "Phir milenge" }
        ],
        funFact: "Namaste means 'I bow to you' — it shows respect and is used for both hello AND goodbye!",
        practice: "Say Namaste to everyone at home today, with your hands pressed together!"
      },
      
      "w1-greetings-howareyou": {
        id: "w1-greetings-howareyou",
        title: "How Are You?",
        category: "Greetings",
        icon: "💬",
        phrases: [
          { hindi: "आप कैसे हैं?", roman: "Aap kaise hain?", english: "How are you? (respectful)", pronunciation: "aap KAY-say hayn", context: "For elders", speakText: "Aap kaise hain" },
          { hindi: "तुम कैसे हो?", roman: "Tum kaise ho?", english: "How are you? (friendly)", pronunciation: "tum KAY-say ho", context: "For friends", speakText: "Tum kaise ho" },
          { hindi: "मैं ठीक हूँ", roman: "Main theek hoon", english: "I am fine", pronunciation: "mayn teek hoon", context: "Common reply", speakText: "Main theek hoon" },
          { hindi: "बहुत अच्छा", roman: "Bahut accha", english: "Very good", pronunciation: "ba-HOOT uch-CHAA", context: "Great response!", speakText: "Bahut accha" }
        ],
        funFact: "Hindi has formal (aap) and informal (tum) versions of 'you' — use 'aap' with elders to show respect!",
        practice: "Ask a relative 'Aap kaise hain?' and respond with 'Main theek hoon'!"
      },
      
      "w1-manners-thanks": {
        id: "w1-manners-thanks",
        title: "Please & Thank You",
        category: "Manners",
        icon: "🙏",
        phrases: [
          { hindi: "शुक्रिया", roman: "Shukriya", english: "Thank you", pronunciation: "shuk-REE-ya", context: "Everyday thanks", speakText: "Shukriya" },
          { hindi: "धन्यवाद", roman: "Dhanyavaad", english: "Thank you (formal)", pronunciation: "dun-ya-VAAD", context: "More formal", speakText: "Dhanyavaad" },
          { hindi: "कृपया", roman: "Kripaya", english: "Please", pronunciation: "kri-PU-ya", context: "Being polite", speakText: "Kripaya" }
        ],
        funFact: "'Shukriya' comes from Arabic and is commonly used across India. 'Dhanyavaad' is the Sanskrit-origin word!",
        practice: "Use Shukriya at least 5 times today when someone helps you!"
      },
      
      "w1-numbers-1to5": {
        id: "w1-numbers-1to5",
        title: "Numbers 1-5",
        category: "Numbers",
        icon: "🔢",
        phrases: [
          { hindi: "एक", roman: "Ek", english: "One (1)", pronunciation: "ek", context: "1", speakText: "Ek" },
          { hindi: "दो", roman: "Do", english: "Two (2)", pronunciation: "doh", context: "2", speakText: "Do" },
          { hindi: "तीन", roman: "Teen", english: "Three (3)", pronunciation: "teen", context: "3", speakText: "Teen" },
          { hindi: "चार", roman: "Chaar", english: "Four (4)", pronunciation: "chaar", context: "4", speakText: "Chaar" },
          { hindi: "पाँच", roman: "Paanch", english: "Five (5)", pronunciation: "paanch", context: "5", speakText: "Paanch" }
        ],
        funFact: "Hindi numbers are used all over India, even in regions that speak other languages!",
        practice: "Count your fingers in Hindi: Ek, do, teen, chaar, paanch!"
      },
      
      "w1-numbers-6to10": {
        id: "w1-numbers-6to10",
        title: "Numbers 6-10",
        category: "Numbers",
        icon: "🔢",

    // ==========================================
    // HELPER: Get flat list of all lesson IDs in order
    // ==========================================
    
    function getAllLessonIds() {
      const ids = [];
      courseStructure.weeks.forEach(week => {
        week.lessons.forEach(lessonId => {
          ids.push(lessonId);
        });
      });
      return ids;
    }
    
    function getTotalLessons() {
      return getAllLessonIds().length;
    }
    
    function getLessonIndex(lessonId) {
      return getAllLessonIds().indexOf(lessonId);
    }
    
    function getPreviousLessonId(lessonId) {
      const allIds = getAllLessonIds();
      const index = allIds.indexOf(lessonId);
      if (index > 0) {
        return allIds[index - 1];
      }
      return null;
    }
    
    // ==========================================
    // APP STATE
    // ==========================================
    
    let state = {
      currentView: 'home',
      currentWeek: 1,
      currentLessonId: null,
      completedLessons: [], // Array of lesson IDs
      quizState: {
        questions: [],
        currentQuestion: 0,
        score: 0,
        answered: false,
        selectedAnswer: null,
        showResult: false
      }
    };

    // ==========================================
    // STORAGE - with migration support
    // ==========================================
    
    function saveProgress() {
      try {
        const data = {
          version: COURSE_VERSION,
          completedLessons: state.completedLessons,
          savedAt: new Date().toISOString()
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) {
        console.log('Could not save progress:', e);
      }
    }

    function loadProgress() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const data = JSON.parse(saved);
          
          // Handle old format (day numbers) - migrate to IDs
          if (data.completedDays && !data.completedLessons) {
            console.log('Migrating from old format...');
            state.completedLessons = migrateFromDayNumbers(data.completedDays);
            saveProgress(); // Save in new format
          } else if (data.completedLessons) {
            // Filter out any lesson IDs that no longer exist
            state.completedLessons = data.completedLessons.filter(id => lessonDatabase[id]);
          }
        }
      } catch (e) {
        console.log('Could not load progress:', e);
      }
    }
    
    // Migration helper: convert old day numbers to lesson IDs
    function migrateFromDayNumbers(dayNumbers) {
      const allIds = getAllLessonIds();
      const lessonIds = [];
      
      dayNumbers.forEach(dayNum => {
        // Day numbers were 1-indexed, array is 0-indexed
        const index = dayNum - 1;
        if (index >= 0 && index < allIds.length) {
          lessonIds.push(allIds[index]);
        }
      });
      
      return lessonIds;
    }

    // ==========================================
    // TEXT TO SPEECH
    // ==========================================
    
    function speak(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'hi-IN';
        utterance.rate = 0.8;
        
        const voices = window.speechSynthesis.getVoices();
        const hindiVoice = voices.find(v => v.lang.includes('hi'));
        if (hindiVoice) {
          utterance.voice = hindiVoice;
        }
        
        window.speechSynthesis.speak(utterance);
      }
    }

    // Load voices
    if ('speechSynthesis' in window) {
      window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
      };
    }

    // ==========================================
    // RENDER FUNCTIONS
    // ==========================================
    
    function render() {
      updateProgress();
      renderWeekTabs();
      
      if (state.currentView === 'home') {
        document.getElementById('homeView').classList.remove('hidden');
        document.getElementById('lessonView').classList.remove('active');
        renderDaysGrid();
      } else {
        document.getElementById('homeView').classList.add('hidden');
        document.getElementById('lessonView').classList.add('active');
        renderLesson();
      }
      
      // Update tagline and version
      document.getElementById('tagline').textContent = courseStructure.description;
      document.getElementById('versionInfo').textContent = `v${COURSE_VERSION} • ${getTotalLessons()} lessons`;
    }

    function updateProgress() {
      const completed = state.completedLessons.length;
      const total = getTotalLessons();
      const percent = (completed / total) * 100;
      
      document.getElementById('progressStats').textContent = `${completed}/${total} days`;
      document.getElementById('progressFill').style.width = `${percent}%`;
    }
    
    function renderWeekTabs() {
      const tabsContainer = document.getElementById('weekTabs');
      let html = '';
      
      courseStructure.weeks.forEach(week => {
        const isActive = week.number === state.currentWeek;
        html += `
          <button class="week-tab ${isActive ? 'active' : ''}" 
                  data-week="${week.number}"
                  onclick="switchWeek(${week.number})">
            ${week.title}
          </button>
        `;
      });
      
      tabsContainer.innerHTML = html;
    }

    function renderDaysGrid() {
      const grid = document.getElementById('daysGrid');
      const currentWeekData = courseStructure.weeks.find(w => w.number === state.currentWeek);
      
      if (!currentWeekData) {
        grid.innerHTML = '<p>Week not found</p>';
        return;
      }
      
      let html = '';
      
      currentWeekData.lessons.forEach((lessonId, indexInWeek) => {
        const lesson = lessonDatabase[lessonId];
        if (!lesson) return;
        
        const globalIndex = getLessonIndex(lessonId);
        const dayNumber = globalIndex + 1;
        
        const isCompleted = state.completedLessons.includes(lessonId);
        const previousLessonId = getPreviousLessonId(lessonId);
        const previousCompleted = !previousLessonId || state.completedLessons.includes(previousLessonId);
        const isLocked = !isCompleted && !previousCompleted;
        const isCurrent = !isLocked && !isCompleted;
        
        html += `
          <div class="day-card ${isCompleted ? 'completed' : ''} ${isLocked ? 'locked' : ''}" 
               data-lesson-id="${lessonId}"
               onclick="${isLocked ? '' : `openLesson('${lessonId}')`}">
            <div class="day-icon">${lesson.icon}</div>
            <div class="day-info">
              <div class="day-number">Day ${dayNumber}</div>
              <div class="day-title">${lesson.title}</div>
            </div>
            <div class="day-status ${isCompleted ? 'completed' : ''} ${isCurrent ? 'current' : ''} ${isLocked ? 'locked' : ''}">
              ${isCompleted ? '✓' : (isCurrent ? '→' : '🔒')}
            </div>
          </div>
        `;
      });
      
      grid.innerHTML = html;
    }

    function renderLesson() {
      const lesson = lessonDatabase[state.currentLessonId];
      if (!lesson) return;
      
      document.getElementById('lessonIcon').textContent = lesson.icon;
      document.getElementById('lessonTitle').textContent = lesson.title;
      document.getElementById('lessonCategory').textContent = lesson.category;
      document.getElementById('funFactText').textContent = lesson.funFact;
      document.getElementById('practiceText').textContent = lesson.practice;
      
      // Render phrases
      let phrasesHtml = '';
      lesson.phrases.forEach((phrase, index) => {
        const speakText = phrase.speakText.replace(/'/g, "\\'");
        phrasesHtml += `
          <div class="phrase-card" onclick="speak('${speakText}')">
            <div class="phrase-main">
              <div>
                <div class="phrase-hindi hindi">${phrase.hindi}</div>
                <div class="phrase-roman">${phrase.roman}</div>
              </div>
              <button class="phrase-speak" onclick="event.stopPropagation(); speak('${speakText}')">
                🔊
              </button>
            </div>
            <div class="phrase-english">${phrase.english}</div>
            <div class="phrase-meta">
              <span class="phrase-pronunciation">${phrase.pronunciation}</span>
              <span class="phrase-context">${phrase.context}</span>
            </div>
          </div>
        `;
      });
      document.getElementById('phrasesList').innerHTML = phrasesHtml;
      
      // Reset quiz state
      resetQuiz();
      
      // Show learn tab by default
      switchTab('learn');
    }

    // ==========================================
    // QUIZ SYSTEM
    // ==========================================
    
    function generateQuiz() {
      const lesson = lessonDatabase[state.currentLessonId];
      if (!lesson) return [];
      
      const questions = [];
      const phrases = [...lesson.phrases];
      
      // Generate questions (up to 4)
      const numQuestions = Math.min(4, phrases.length);
      
      for (let i = 0; i < numQuestions; i++) {
        const phrase = phrases[i];
        const isHindiToEnglish = Math.random() > 0.5;
        
        // Get wrong answers from other phrases
        const otherPhrases = phrases.filter((_, idx) => idx !== i);
        const wrongAnswers = otherPhrases
          .slice(0, 3)
          .map(p => isHindiToEnglish ? p.english : p.roman);
        
        // Add generic wrong answers if needed
        const genericWrong = isHindiToEnglish 
          ? ['Good morning', 'Thank you', 'Goodbye', 'I am fine', 'Where is it?', 'Please help', 'See you later']
          : ['Namaste', 'Shukriya', 'Theek hai', 'Bahut accha', 'Kya hua', 'Chalo', 'Paani'];
        
        while (wrongAnswers.length < 3) {
          const wrong = genericWrong[Math.floor(Math.random() * genericWrong.length)];
          if (!wrongAnswers.includes(wrong) && wrong !== (isHindiToEnglish ? phrase.english : phrase.roman)) {
            wrongAnswers.push(wrong);
          }
        }
        
        const correctAnswer = isHindiToEnglish ? phrase.english : phrase.roman;
        const allAnswers = [correctAnswer, ...wrongAnswers.slice(0, 3)].sort(() => Math.random() - 0.5);
        
        questions.push({
          question: isHindiToEnglish ? phrase.roman : phrase.english,
          prompt: isHindiToEnglish ? 'What does this mean?' : 'How do you say this in Hindi?',
          options: allAnswers,
          correct: correctAnswer,
          hindi: phrase.hindi,
          speakText: phrase.speakText
        });
      }
      
      return questions;
    }

    function resetQuiz() {
      state.quizState = {
        questions: generateQuiz(),
        currentQuestion: 0,
        score: 0,
        answered: false,
        selectedAnswer: null,
        showResult: false
      };
    }

    function renderQuiz() {
      const { questions, currentQuestion, score, answered, selectedAnswer, showResult } = state.quizState;
      const quizContent = document.getElementById('quizContent');
      const quizProgress = document.getElementById('quizProgress');
      
      // Render progress dots
      let progressHtml = '';
      for (let i = 0; i < questions.length; i++) {
        let dotClass = '';
        if (i < currentQuestion) dotClass = 'answered';
        else if (i === currentQuestion && !showResult) dotClass = 'current';
        else if (showResult) dotClass = 'answered';
        progressHtml += `<div class="quiz-dot ${dotClass}"></div>`;
      }
      quizProgress.innerHTML = progressHtml;
      
      // Show result or question
      if (showResult) {
        const percent = questions.length > 0 ? Math.round((score / questions.length) * 100) : 0;
        let message = '';
        if (percent === 100) message = 'Perfect! Bahut badhiya! 🌟';
        else if (percent >= 75) message = 'Great job! Keep it up!';
        else if (percent >= 50) message = 'Good effort! Practice makes perfect!';
        else message = 'Keep practicing! You\'ll get there!';
        
        const dayNumber = getLessonIndex(state.currentLessonId) + 1;
        
        quizContent.innerHTML = `
          <div class="quiz-result">
            <div class="quiz-score">${score}/${questions.length}</div>
            <p class="quiz-message">${message}</p>
          </div>
          <button class="btn btn-primary" onclick="completeLesson()">
            Complete Day ${dayNumber} ✓
          </button>
          <button class="btn btn-secondary" style="margin-top: 10px" onclick="retryQuiz()">
            Try Again
          </button>
        `;
        return;
      }
      
      if (questions.length === 0) {
        quizContent.innerHTML = `
          <p style="text-align: center; color: var(--text-secondary);">No quiz for this lesson.</p>
          <button class="btn btn-primary" style="margin-top: 20px" onclick="completeLesson()">
            Complete Lesson ✓
          </button>
        `;
        return;
      }
      
      const q = questions[currentQuestion];
      if (!q) return;
      
      let optionsHtml = '';
      q.options.forEach((option) => {
        let optionClass = '';
        if (answered) {
          if (option === q.correct) optionClass = 'correct';
          else if (option === selectedAnswer) optionClass = 'incorrect';
        } else if (option === selectedAnswer) {
          optionClass = 'selected';
        }
        const escapedOption = option.replace(/'/g, "\\'");
        optionsHtml += `
          <button class="quiz-option ${optionClass}" 
                  onclick="selectAnswer('${escapedOption}')"
                  ${answered ? 'disabled' : ''}>
            ${option}
          </button>
        `;
      });
      
      quizContent.innerHTML = `
        <div class="quiz-question">${q.question}</div>
        <p class="quiz-prompt">${q.prompt}</p>
        <div class="quiz-options">${optionsHtml}</div>
        ${answered ? `
          <button class="btn btn-primary" style="margin-top: 20px" onclick="nextQuestion()">
            ${currentQuestion < questions.length - 1 ? 'Next Question →' : 'See Results'}
          </button>
        ` : ''}
      `;
    }

    function selectAnswer(answer) {
      if (state.quizState.answered) return;
      
      state.quizState.selectedAnswer = answer;
      state.quizState.answered = true;
      
      const q = state.quizState.questions[state.quizState.currentQuestion];
      if (answer === q.correct) {
        state.quizState.score++;
      }
      
      renderQuiz();
    }

    function nextQuestion() {
      const { questions, currentQuestion } = state.quizState;
      
      if (currentQuestion < questions.length - 1) {
        state.quizState.currentQuestion++;
        state.quizState.answered = false;
        state.quizState.selectedAnswer = null;
      } else {
        state.quizState.showResult = true;
      }
      
      renderQuiz();
    }

    function retryQuiz() {
      resetQuiz();
      renderQuiz();
    }

    function completeLesson() {
      if (!state.completedLessons.includes(state.currentLessonId)) {
        state.completedLessons.push(state.currentLessonId);
        saveProgress();
      }
      goHome();
    }

    // ==========================================
    // NAVIGATION
    // ==========================================
    
    function openLesson(lessonId) {
      if (!lessonDatabase[lessonId]) return;
      
      state.currentLessonId = lessonId;
      state.currentView = 'lesson';
      render();
      
      // Scroll to top
      window.scrollTo(0, 0);
    }

    function goHome() {
      state.currentView = 'home';
      state.currentLessonId = null;
      render();
    }

    function switchTab(tabName) {
      document.querySelectorAll('.lesson-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.tab === tabName);
      });
      
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.remove('active');
      });
      
      if (tabName === 'learn') {
        document.getElementById('learnTab').classList.add('active');
      } else {
        document.getElementById('quizTab').classList.add('active');
        renderQuiz();
      }
    }

    function switchWeek(weekNumber) {
      state.currentWeek = weekNumber;
      render();
    }

    // ==========================================
    // EVENT LISTENERS
    // ==========================================
    
    document.getElementById('backBtn').addEventListener('click', goHome);
    
    document.getElementById('startQuizBtn').addEventListener('click', () => {
      switchTab('quiz');
    });
    
    document.querySelectorAll('.lesson-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        switchTab(tab.dataset.tab);
      });
    });

    // ==========================================
    // INIT
    // ==========================================
    
    loadProgress();
    render();
  </script>
