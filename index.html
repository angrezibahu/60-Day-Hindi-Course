<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#c9a227">
  <title>Hindi for Family</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23c9a227'/><text x='50' y='68' font-size='60' text-anchor='middle' fill='%23722f37' font-family='serif'>ॐ</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23c9a227'/><text x='50' y='68' font-size='60' text-anchor='middle' fill='%23722f37' font-family='serif'>ॐ</text></svg>">
  <style>
    @import url('https://fonts.cdnfonts.com/css/opendyslexic');
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600&display=swap');
    
    :root {
      /* Metallic Gold Theme */
      --bg-gold-light: #f5e6a3;
      --bg-gold-mid: #d4af37;
      --bg-gold-dark: #b8960c;
      --bg-card: linear-gradient(145deg, #e8d48a, #c9a227);
      --bg-card-solid: #d4b84a;
      --bg-card-hover: #e0c555;
      --accent-burgundy: #722f37;
      --accent-dark: #4a1c20;
      --text-primary: #2d1810;
      --text-secondary: #4a3728;
      --text-muted: #6b5344;
      --success: #2d5016;
      --success-bg: #8fbc5a;
      --radius: 16px;
      --radius-sm: 10px;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: 'OpenDyslexic', 'OpenDyslexic3', sans-serif;
      background: linear-gradient(135deg, #f5e6a3 0%, #d4af37 30%, #c9a227 50%, #b8960c 70%, #d4af37 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
      font-size: 16px;
      letter-spacing: 0.02em;
    }
    
    /* Add metallic sheen effect */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.03) 2px,
          rgba(255,255,255,0.03) 4px
        );
      pointer-events: none;
      z-index: 0;
    }
    
    .hindi {
      font-family: 'Noto Sans Devanagari', sans-serif;
    }
    
    .app {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
      padding-bottom: 100px;
      position: relative;
      z-index: 1;
    }
    
    .header {
      text-align: center;
      padding: 30px 0 40px;
      position: relative;
    }

    .app-icon {
      font-size: 3.5rem;
      line-height: 1;
      margin-bottom: 8px;
      color: var(--accent-burgundy);
      text-shadow: 2px 2px 6px rgba(255,255,255,0.4), 0 0 20px rgba(201,162,39,0.3);
      font-family: 'Noto Sans Devanagari', serif;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent-burgundy);
      text-shadow: 2px 2px 4px rgba(255,255,255,0.3);
      margin-bottom: 8px;
    }
    
    .tagline {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    
    .progress-container {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 30px;
      box-shadow: 
        inset 2px 2px 4px rgba(255,255,255,0.3),
        inset -2px -2px 4px rgba(0,0,0,0.1),
        3px 3px 8px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .progress-label {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-primary);
    }
    
    .progress-stats {
      color: var(--accent-burgundy);
      font-weight: 700;
      font-size: 0.9rem;
    }
    
    .progress-bar {
      height: 10px;
      background: rgba(0,0,0,0.15);
      border-radius: 5px;
      overflow: hidden;
      box-shadow: inset 1px 1px 3px rgba(0,0,0,0.2);
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-burgundy), var(--accent-dark));
      border-radius: 5px;
      transition: width 0.5s ease;
    }
    
    .week-tabs-wrapper {
      position: relative;
      margin-bottom: 24px;
    }
    
    .week-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 4px 4px 16px 4px;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    
    .week-tabs::-webkit-scrollbar {
      height: 8px;
    }
    
    .week-tabs::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.1);
      border-radius: 4px;
    }
    
    .week-tabs::-webkit-scrollbar-thumb {
      background: var(--accent-burgundy);
      border-radius: 4px;
    }
    
    .scroll-hint {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: -8px;
      margin-bottom: 16px;
      font-weight: 600;
    }
    
    .week-tab {
      flex: 0 0 auto;
      padding: 12px 20px;
      background: var(--bg-card);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 25px;
      color: var(--text-primary);
      font-family: 'OpenDyslexic', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.15);
    }
    
    .week-tab:hover {
      background: var(--bg-card-hover);
      transform: translateY(-2px);
    }
    
    .week-tab.active {
      background: linear-gradient(145deg, var(--accent-burgundy), var(--accent-dark));
      color: #f5e6a3;
      border-color: var(--accent-dark);
    }
    
    .days-grid {
      display: grid;
      gap: 12px;
    }
    
    .day-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid rgba(255,255,255,0.2);
      box-shadow: 
        inset 1px 1px 3px rgba(255,255,255,0.3),
        3px 3px 8px rgba(0,0,0,0.15);
    }
    
    .day-card:hover {
      background: var(--bg-card-hover);
      transform: translateY(-3px);
      box-shadow: 
        inset 1px 1px 3px rgba(255,255,255,0.3),
        5px 5px 15px rgba(0,0,0,0.2);
    }
    
    .day-card.completed {
      border-color: var(--success);
      background: linear-gradient(145deg, #c9d4a0, #a8b878);
    }
    
    .day-card.locked {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .day-card.locked:hover {
      transform: none;
      background: var(--bg-card);
    }
    
    .day-icon {
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.4);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: inset 1px 1px 2px rgba(255,255,255,0.5);
    }
    
    .day-info {
      flex: 1;
    }
    
    .day-number {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
      font-weight: 600;
    }
    
    .day-title {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-primary);
    }
    
    .day-status {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: bold;
    }
    
    .day-status.completed {
      background: var(--success-bg);
      color: var(--success);
    }
    
    .day-status.current {
      background: var(--accent-burgundy);
      color: #f5e6a3;
    }
    
    .day-status.locked {
      background: rgba(0,0,0,0.1);
      color: var(--text-muted);
    }
    
    .lesson-view {
      display: none;
    }
    
    .lesson-view.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-family: 'OpenDyslexic', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      padding: 10px 0;
      margin-bottom: 20px;
    }
    
    .back-btn:hover {
      color: var(--accent-burgundy);
    }
    
    .lesson-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .lesson-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    
    .lesson-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--accent-burgundy);
    }
    
    .lesson-category {
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .phrases-section {
      margin-bottom: 30px;
    }
    
    .section-title {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
      font-weight: 700;
    }
    
    .phrase-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid rgba(255,255,255,0.2);
      box-shadow: 
        inset 1px 1px 3px rgba(255,255,255,0.3),
        3px 3px 8px rgba(0,0,0,0.15);
    }
    
    .phrase-card:hover {
      background: var(--bg-card-hover);
    }
    
    .phrase-card:active {
      transform: scale(0.98);
    }
    
    .phrase-main {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    
    .phrase-hindi {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-primary);
    }
    
    .phrase-roman {
      color: var(--accent-burgundy);
      font-size: 1.1rem;
      font-weight: 600;
    }
    
    .phrase-speak {
      width: 48px;
      height: 48px;
      background: linear-gradient(145deg, var(--accent-burgundy), var(--accent-dark));
      border: none;
      border-radius: 50%;
      color: #f5e6a3;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.2s;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.3);
    }
    
    .phrase-speak:hover {
      transform: scale(1.1);
    }
    
    .phrase-speak:active {
      transform: scale(0.95);
    }
    
    .phrase-english {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .phrase-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .phrase-pronunciation {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-style: italic;
    }
    
    .phrase-context {
      font-size: 0.8rem;
      color: var(--accent-dark);
      background: rgba(255,255,255,0.5);
      padding: 4px 12px;
      border-radius: 12px;
      font-weight: 600;
    }
    
    .fun-fact {
      background: linear-gradient(145deg, #e8d48a, #d4b84a);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 30px;
      border-left: 4px solid var(--accent-burgundy);
      box-shadow: 3px 3px 8px rgba(0,0,0,0.15);
    }
    
    .fun-fact-label {
      font-size: 0.8rem;
      color: var(--accent-burgundy);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
    }
    
    .fun-fact-text {
      color: var(--text-primary);
      font-size: 0.95rem;
      line-height: 1.7;
    }
    
    .practice-box {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 30px;
      text-align: center;
      box-shadow: 
        inset 1px 1px 3px rgba(255,255,255,0.3),
        3px 3px 8px rgba(0,0,0,0.15);
    }
    
    .practice-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      font-weight: 700;
    }
    
    .practice-text {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .quiz-section {
      margin-bottom: 30px;
    }
    
    .quiz-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 
        inset 1px 1px 3px rgba(255,255,255,0.3),
        3px 3px 8px rgba(0,0,0,0.15);
    }
    
    .quiz-progress {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }
    
    .quiz-dot {
      flex: 1;
      height: 6px;
      background: rgba(0,0,0,0.15);
      border-radius: 3px;
    }
    
    .quiz-dot.answered {
      background: var(--success-bg);
    }
    
    .quiz-dot.current {
      background: var(--accent-burgundy);
    }
    
    .quiz-question {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
      color: var(--text-primary);
    }
    
    .quiz-prompt {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .quiz-options {
      display: grid;
      gap: 10px;
    }
    
    .quiz-option {
      background: rgba(255,255,255,0.4);
      border: 2px solid rgba(0,0,0,0.1);
      border-radius: var(--radius-sm);
      padding: 16px;
      font-family: 'OpenDyslexic', sans-serif;
      font-size: 1rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    
    .quiz-option:hover:not(:disabled) {
      border-color: var(--accent-burgundy);
      background: rgba(255,255,255,0.6);
    }
    
    .quiz-option.selected {
      border-color: var(--accent-burgundy);
      background: rgba(114, 47, 55, 0.1);
    }
    
    .quiz-option.correct {
      border-color: var(--success);
      background: rgba(45, 80, 22, 0.15);
    }
    
    .quiz-option.incorrect {
      border-color: #b91c1c;
      background: rgba(185, 28, 28, 0.1);
    }
    
    .quiz-option:disabled {
      cursor: default;
    }
    
    .quiz-result {
      text-align: center;
      padding: 20px 0;
    }
    
    .quiz-score {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent-burgundy);
    }
    
    .quiz-message {
      color: var(--text-secondary);
      margin-top: 8px;
    }
    
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'OpenDyslexic', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(145deg, var(--accent-burgundy), var(--accent-dark));
      color: #f5e6a3;
      box-shadow: 3px 3px 8px rgba(0,0,0,0.3);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
    }
    
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 2px solid rgba(0,0,0,0.1);
    }
    
    .btn-secondary:hover {
      background: var(--bg-card-hover);
    }
    
    .complete-btn {
      margin-top: 20px;
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    .lesson-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      background: rgba(0,0,0,0.1);
      border-radius: var(--radius);
      padding: 4px;
    }
    
    .lesson-tab {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-family: 'OpenDyslexic', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .lesson-tab.active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
    }
    
    .home-view {
      display: block;
    }
    
    .home-view.hidden {
      display: none;
    }
    
    .version-info {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    @media (max-width: 380px) {
      .app {
        padding: 16px;
      }
      
      .phrase-hindi {
        font-size: 1.2rem;
      }
      
      .phrase-roman {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="home-view" id="homeView">
      <header class="header">
        <div class="app-icon">ॐ</div>
        <h1 class="logo">Hindi for Family</h1>
        <p class="tagline" id="tagline">60 days to confident conversation</p>
      </header>
      
      <div class="progress-container">
        <div class="progress-header">
          <span class="progress-label">Your Progress</span>
          <span class="progress-stats" id="progressStats">0/65 days</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
      </div>
      
      <div class="week-tabs-wrapper">
        <div class="week-tabs" id="weekTabs"></div>
        <div class="scroll-hint" id="scrollHint">← Swipe for Weeks 6-10 →</div>
      </div>
      
      <div class="days-grid" id="daysGrid"></div>
      
      <div class="version-info" id="versionInfo"></div>
    </div>
    
    <div class="lesson-view" id="lessonView">
      <button class="back-btn" id="backBtn">
        <span>←</span> Back to lessons
      </button>
      
      <div class="lesson-header">
        <div class="lesson-icon" id="lessonIcon">👋</div>
        <h2 class="lesson-title" id="lessonTitle">Hello & Goodbye</h2>
        <span class="lesson-category" id="lessonCategory">Greetings</span>
      </div>
      
      <div class="lesson-tabs">
        <button class="lesson-tab active" data-tab="learn">Learn</button>
        <button class="lesson-tab" data-tab="quiz">Quiz</button>
      </div>
      
      <div class="tab-content active" id="learnTab">
        <div class="phrases-section">
          <h3 class="section-title">Today's Phrases</h3>
          <div id="phrasesList"></div>
        </div>
        
        <div class="fun-fact" id="funFact">
          <div class="fun-fact-label">💡 Fun Fact</div>
          <p class="fun-fact-text" id="funFactText"></p>
        </div>
        
        <div class="practice-box">
          <div class="practice-label">🎯 Today's Challenge</div>
          <p class="practice-text" id="practiceText"></p>
        </div>
        
        <button class="btn btn-primary complete-btn" id="startQuizBtn">
          Take the Quiz →
        </button>
      </div>
      
      <div class="tab-content" id="quizTab">
        <div class="quiz-section">
          <div class="quiz-card" id="quizCard">
            <div class="quiz-progress" id="quizProgress"></div>
            <div id="quizContent"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const COURSE_VERSION = "2.3.0";
    const STORAGE_KEY = "hindiFamilyCourse";
    
    const lessonDatabase = {

      "w4-emotions-feelings": { id: "w4-emotions-feelings", title: "Feelings", category: "Emotions", icon: "😊", phrases: [{ hindi: "खुश", roman: "Khush", english: "Happy", pronunciation: "khoosh", context: "Feeling good", speakText: "Main khush hoon" }, { hindi: "थका हुआ", roman: "Thaka hua", english: "Tired", pronunciation: "TUH-kaa HOO-ah", context: "Need rest", speakText: "Main thaka hua hoon" }, { hindi: "बोर", roman: "Bor", english: "Bored", pronunciation: "bohr", context: "Same word!", speakText: "Main bor hoon" }, { hindi: "ठंडा", roman: "Thanda", english: "Cold", pronunciation: "TUN-daa", context: "Temperature", speakText: "Mujhe thanda lag raha hai" }], funFact: "English words like 'bored' are commonly used in Hindi!", practice: "Tell someone how you feel using 'Main ___ hoon'!" },
      "w4-review": { id: "w4-review", title: "Week 4 Review", category: "Review", icon: "⭐", phrases: [{ hindi: "आज क्या हुआ?", roman: "Aaj kya hua?", english: "What happened today?", pronunciation: "aaj kyaa HOO-ah", context: "About day", speakText: "Aaj kya hua" }, { hindi: "सब ठीक है", roman: "Sab theek hai", english: "Everything is fine", pronunciation: "sub teek hay", context: "Common response", speakText: "Sab theek hai" }, { hindi: "कल बात करते हैं", roman: "Kal baat karte hain", english: "Let's talk tomorrow", pronunciation: "kul baat KUR-tay hayn", context: "Saying bye", speakText: "Kal baat karte hain" }], funFact: "You now have all the building blocks for real Hindi conversations!", practice: "Have a 2-minute Hindi-only conversation!" },
      "w5-phrases-useful": { id: "w5-phrases-useful", title: "Useful Expressions", category: "Phrases", icon: "💬", phrases: [{ hindi: "कोई बात नहीं", roman: "Koi baat nahin", english: "No problem / It's OK", pronunciation: "koy baat na-HEEN", context: "Very useful!", speakText: "Koi baat nahin" }, { hindi: "बहुत बढ़िया", roman: "Bahut badhiya", english: "Excellent", pronunciation: "ba-HOOT buh-DEE-ya", context: "Praise!", speakText: "Bahut badhiya" }, { hindi: "एक मिनट", roman: "Ek minute", english: "One minute / Wait", pronunciation: "ek MIN-it", context: "Asking to wait", speakText: "Ek minute" }, { hindi: "फिर से", roman: "Phir se", english: "Again", pronunciation: "fir say", context: "Repeat", speakText: "Phir se" }], funFact: "'Koi baat nahin' is the Hindi 'no worries'!", practice: "Use 'Bahut badhiya!' to praise someone today!" },
      "w5-final": { id: "w5-final", title: "30 Days Complete!", category: "Milestone", icon: "🎉", phrases: [{ hindi: "नमस्ते! आप कैसे हैं?", roman: "Namaste! Aap kaise hain?", english: "Hello! How are you?", pronunciation: "nuh-MUS-tay! aap KAY-say hayn", context: "Greeting", speakText: "Namaste! Aap kaise hain" }, { hindi: "मैं ठीक हूँ, आप सुनाइए", roman: "Main theek hoon, aap sunaiye", english: "I'm fine, tell me about you", pronunciation: "mayn teek hoon, aap soo-NAI-yay", context: "Polite response", speakText: "Main theek hoon, aap sunaiye" }, { hindi: "बहुत अच्छा लगा आपसे मिलके", roman: "Bahut accha laga aapse milke", english: "Great to meet you", pronunciation: "ba-HOOT uch-CHAA LUH-gaa AAP-say MIL-kay", context: "Goodbye", speakText: "Bahut accha laga aapse milke" }], funFact: "You've completed 30 days of Hindi! You know 100+ phrases!", practice: "Call a relative and have a full Hindi conversation!" },
      "w6-numbers-11to15": { id: "w6-numbers-11to15", title: "Numbers 11-15", category: "Numbers", icon: "🔢", phrases: [{ hindi: "ग्यारह", roman: "Gyaarah", english: "Eleven (11)", pronunciation: "GYAA-ruh", context: "11", speakText: "Gyaarah" }, { hindi: "बारह", roman: "Baarah", english: "Twelve (12)", pronunciation: "BAA-ruh", context: "12", speakText: "Baarah" }, { hindi: "तेरह", roman: "Terah", english: "Thirteen (13)", pronunciation: "TAY-ruh", context: "13", speakText: "Terah" }, { hindi: "चौदह", roman: "Chaudah", english: "Fourteen (14)", pronunciation: "CHOW-duh", context: "14", speakText: "Chaudah" }, { hindi: "पंद्रह", roman: "Pandrah", english: "Fifteen (15)", pronunciation: "PUN-druh", context: "15", speakText: "Pandrah" }], funFact: "Hindi numbers 11-19 don't follow a simple pattern — each is unique!", practice: "Practice: 'Main baarah saal ka/ki hoon' (I am 12 years old)." },
      "w6-numbers-16to20": { id: "w6-numbers-16to20", title: "Numbers 16-20", category: "Numbers", icon: "🔢", phrases: [{ hindi: "सोलह", roman: "Solah", english: "Sixteen (16)", pronunciation: "SOH-luh", context: "16", speakText: "Solah" }, { hindi: "सत्रह", roman: "Satrah", english: "Seventeen (17)", pronunciation: "SUT-ruh", context: "17", speakText: "Satrah" }, { hindi: "अठारह", roman: "Athaarah", english: "Eighteen (18)", pronunciation: "uh-THAA-ruh", context: "18", speakText: "Athaarah" }, { hindi: "उन्नीस", roman: "Unnis", english: "Nineteen (19)", pronunciation: "oon-NEES", context: "19", speakText: "Unnis" }, { hindi: "बीस", roman: "Bees", english: "Twenty (20)", pronunciation: "bees", context: "20", speakText: "Bees" }], funFact: "'Bees' (20) is easy to remember!", practice: "Count from ek to bees without looking!" },
      "w6-descriptions-bigsmall": { id: "w6-descriptions-bigsmall", title: "Big & Small", category: "Descriptions", icon: "📏", phrases: [{ hindi: "बड़ा", roman: "Bada", english: "Big (masculine)", pronunciation: "BUH-daa", context: "For masculine", speakText: "Bada" }, { hindi: "बड़ी", roman: "Badi", english: "Big (feminine)", pronunciation: "BUH-dee", context: "For feminine", speakText: "Badi" }, { hindi: "छोटा", roman: "Chhota", english: "Small (masculine)", pronunciation: "CHO-taa", context: "For masculine", speakText: "Chhota" }, { hindi: "छोटी", roman: "Chhoti", english: "Small (feminine)", pronunciation: "CHO-tee", context: "For feminine", speakText: "Chhoti" }], funFact: "Adjectives change based on the noun's gender!", practice: "Point at things: 'Yeh bada hai' or 'Yeh chhota hai'!" },
      "w6-descriptions-goodbad": { id: "w6-descriptions-goodbad", title: "Good & Bad", category: "Descriptions", icon: "👍", phrases: [{ hindi: "अच्छा", roman: "Accha", english: "Good (masculine)", pronunciation: "uch-CHAA", context: "Also means OK!", speakText: "Accha" }, { hindi: "अच्छी", roman: "Acchi", english: "Good (feminine)", pronunciation: "uch-CHEE", context: "For feminine", speakText: "Acchi" }, { hindi: "बुरा", roman: "Bura", english: "Bad (masculine)", pronunciation: "BOO-raa", context: "Negative", speakText: "Bura" }, { hindi: "बुरी", roman: "Buri", english: "Bad (feminine)", pronunciation: "BOO-ree", context: "For feminine", speakText: "Buri" }, { hindi: "ठीक-ठाक", roman: "Theek-thaak", english: "So-so / Okay", pronunciation: "teek-TAAK", context: "Not great, not bad", speakText: "Theek thaak" }], funFact: "'Accha' can mean good, okay, really?, I see, or a filler word!", practice: "React to food: 'Bahut accha!' or 'Theek-thaak hai'." },
      "w6-descriptions-hotcold": { id: "w6-descriptions-hotcold", title: "Hot & Cold", category: "Descriptions", icon: "🌡️", phrases: [{ hindi: "गरम", roman: "Garam", english: "Hot", pronunciation: "GUH-rum", context: "Temperature", speakText: "Garam" }, { hindi: "ठंडा", roman: "Thanda", english: "Cold (masculine)", pronunciation: "TUN-daa", context: "Temperature", speakText: "Thanda" }, { hindi: "ठंडी", roman: "Thandi", english: "Cold (feminine)", pronunciation: "TUN-dee", context: "For feminine", speakText: "Thandi" }, { hindi: "गरम चाय", roman: "Garam chai", english: "Hot tea", pronunciation: "GUH-rum chaai", context: "Common!", speakText: "Garam chai" }, { hindi: "ठंडा पानी", roman: "Thanda paani", english: "Cold water", pronunciation: "TUN-daa PAA-nee", context: "Very useful!", speakText: "Thanda paani" }], funFact: "'Garam' doesn't change for gender, but 'thanda/thandi' does.", practice: "Order: 'Mujhe thanda paani chahiye'!" },
      "w6-colours-basic": { id: "w6-colours-basic", title: "Basic Colours", category: "Colours", icon: "🎨", phrases: [{ hindi: "लाल", roman: "Laal", english: "Red", pronunciation: "laal", context: "Colour", speakText: "Laal" }, { hindi: "नीला", roman: "Neela", english: "Blue (masculine)", pronunciation: "NEE-laa", context: "Changes to neeli", speakText: "Neela" }, { hindi: "हरा", roman: "Hara", english: "Green (masculine)", pronunciation: "HUH-raa", context: "Changes to hari", speakText: "Hara" }, { hindi: "पीला", roman: "Peela", english: "Yellow (masculine)", pronunciation: "PEE-laa", context: "Changes to peeli", speakText: "Peela" }, { hindi: "सफ़ेद", roman: "Safed", english: "White", pronunciation: "suh-FAYD", context: "No gender change", speakText: "Safed" }], funFact: "Some colours change for gender (neela→neeli) but 'laal' stays the same!", practice: "Point at things: 'Yeh laal hai'!" },
      "w6-review": { id: "w6-review", title: "Week 6 Review", category: "Review", icon: "⭐", phrases: [{ hindi: "मुझे ठंडा पानी चाहिए", roman: "Mujhe thanda paani chahiye", english: "I want cold water", pronunciation: "MUJ-hay TUN-daa PAA-nee chaa-HI-yay", context: "Useful!", speakText: "Mujhe thanda paani chahiye" }, { hindi: "यह बहुत अच्छा है", roman: "Yeh bahut accha hai", english: "This is very good", pronunciation: "yeh ba-HOOT uch-CHAA hay", context: "Compliment!", speakText: "Yeh bahut accha hai" }, { hindi: "वह बड़ा नीला घर है", roman: "Woh bada neela ghar hai", english: "That is a big blue house", pronunciation: "woh BUH-daa NEE-laa gur hay", context: "Describing!", speakText: "Woh bada neela ghar hai" }], funFact: "You can now count to 20 and describe things!", practice: "Describe 5 things around you using size, quality, and colour!" },
      "w7-food-meals": { id: "w7-food-meals", title: "Meals", category: "Food", icon: "🍽️", phrases: [{ hindi: "नाश्ता", roman: "Naashta", english: "Breakfast", pronunciation: "NAASH-taa", context: "Morning", speakText: "Naashta" }, { hindi: "दोपहर का खाना", roman: "Dopahar ka khana", english: "Lunch", pronunciation: "doh-PUH-hur kaa KHAA-naa", context: "Midday", speakText: "Dopahar ka khana" }, { hindi: "रात का खाना", roman: "Raat ka khana", english: "Dinner", pronunciation: "raat kaa KHAA-naa", context: "Night", speakText: "Raat ka khana" }, { hindi: "खाना खा लिया?", roman: "Khana kha liya?", english: "Have you eaten?", pronunciation: "KHAA-naa khaa LI-yaa", context: "Common question!", speakText: "Khana kha liya" }], funFact: "'Khana kha liya?' is how Indians show they care!", practice: "Ask family 'Naashta kha liya?' tomorrow morning!" },
      "w7-food-dishes": { id: "w7-food-dishes", title: "Common Dishes", category: "Food", icon: "🍛", phrases: [{ hindi: "रोटी", roman: "Roti", english: "Flatbread", pronunciation: "ROH-tee", context: "Staple", speakText: "Roti" }, { hindi: "चावल", roman: "Chaawal", english: "Rice", pronunciation: "CHAA-wul", context: "Staple", speakText: "Chaawal" }, { hindi: "दाल", roman: "Daal", english: "Lentils", pronunciation: "daal", context: "Protein", speakText: "Daal" }, { hindi: "सब्ज़ी", roman: "Sabzi", english: "Vegetable dish", pronunciation: "SUB-zee", context: "Cooked veggies", speakText: "Sabzi" }, { hindi: "दाल-चावल", roman: "Daal-chaawal", english: "Lentils and rice", pronunciation: "daal-CHAA-wul", context: "Classic!", speakText: "Daal chaawal" }], funFact: "'Daal-chaawal' is comfort food for most Indians!", practice: "At dinner: 'Yeh roti hai, yeh sabzi hai'!" },
      "w7-food-tastes": { id: "w7-food-tastes", title: "Tastes", category: "Food", icon: "😋", phrases: [{ hindi: "मीठा", roman: "Meetha", english: "Sweet", pronunciation: "MEE-taa", context: "Taste", speakText: "Meetha" }, { hindi: "नमकीन", roman: "Namkeen", english: "Salty", pronunciation: "num-KEEN", context: "Also: snacks", speakText: "Namkeen" }, { hindi: "तीखा", roman: "Teekha", english: "Spicy", pronunciation: "TEE-kaa", context: "Hot/chilli", speakText: "Teekha" }, { hindi: "खट्टा", roman: "Khatta", english: "Sour", pronunciation: "KHUT-taa", context: "Like lemon", speakText: "Khatta" }, { hindi: "स्वादिष्ट", roman: "Swaadisht", english: "Delicious", pronunciation: "swaa-DISHT", context: "Tasty!", speakText: "Swaadisht" }], funFact: "'Namkeen' also means crunchy savoury snacks!", practice: "Describe food: 'Yeh bahut teekha hai!' or 'Bahut swaadisht!'" },
      "w7-food-more": { id: "w7-food-more", title: "More Food Words", category: "Food", icon: "🥗", phrases: [{ hindi: "फल", roman: "Phal", english: "Fruit", pronunciation: "ful", context: "General", speakText: "Phal" }, { hindi: "आम", roman: "Aam", english: "Mango", pronunciation: "aam", context: "King of fruits!", speakText: "Aam" }, { hindi: "केला", roman: "Kela", english: "Banana", pronunciation: "KAY-laa", context: "Common fruit", speakText: "Kela" }, { hindi: "मिठाई", roman: "Mithai", english: "Sweets/Dessert", pronunciation: "mi-THAI", context: "Indian sweets", speakText: "Mithai" }, { hindi: "अचार", roman: "Achaar", english: "Pickle", pronunciation: "uh-CHAAR", context: "Spicy preserve", speakText: "Achaar" }], funFact: "Mango is India's national fruit — over 1,000 varieties!", practice: "Ask for fruit: 'Mujhe aam chahiye'!" },
      "w7-food-requests": { id: "w7-food-requests", title: "Food Requests", category: "Food", icon: "🙋", phrases: [{ hindi: "और चाहिए", roman: "Aur chahiye", english: "Want more", pronunciation: "owr chaa-HI-yay", context: "Asking for more", speakText: "Aur chahiye" }, { hindi: "बस, बहुत हो गया", roman: "Bas, bahut ho gaya", english: "Enough, that's plenty", pronunciation: "bus, ba-HOOT ho GUH-ya", context: "Stop serving!", speakText: "Bas, bahut ho gaya" }, { hindi: "थोड़ा सा", roman: "Thoda sa", english: "A little bit", pronunciation: "TOH-daa saa", context: "Small amount", speakText: "Thoda sa" }, { hindi: "पेट भर गया", roman: "Pet bhar gaya", english: "I'm full", pronunciation: "payt bur GUH-ya", context: "Can't eat more!", speakText: "Pet bhar gaya" }], funFact: "'Bas!' means 'Stop!' or 'Enough!' — useful when relatives keep serving!", practice: "At meals: 'Thoda sa dijiye' and 'Bas, pet bhar gaya'!" },
      "w7-drinks": { id: "w7-drinks", title: "Drinks", category: "Food", icon: "🥤", phrases: [{ hindi: "पानी", roman: "Paani", english: "Water", pronunciation: "PAA-nee", context: "You know this!", speakText: "Paani" }, { hindi: "चाय", roman: "Chai", english: "Tea", pronunciation: "chaai", context: "You know this!", speakText: "Chai" }, { hindi: "दूध", roman: "Doodh", english: "Milk", pronunciation: "doodh", context: "You know this!", speakText: "Doodh" }, { hindi: "जूस", roman: "Juice", english: "Juice", pronunciation: "joos", context: "Same word!", speakText: "Juice" }, { hindi: "लस्सी", roman: "Lassi", english: "Yogurt drink", pronunciation: "LUS-see", context: "Sweet or salty", speakText: "Lassi" }], funFact: "Lassi is a yogurt drink — 'meethi lassi' is sweet, 'namkeen lassi' is salty!", practice: "Order: 'Mujhe meethi lassi chahiye'!" },
      "w7-review": { id: "w7-review", title: "Week 7 Review", category: "Review", icon: "⭐", phrases: [{ hindi: "खाना बहुत स्वादिष्ट है", roman: "Khana bahut swaadisht hai", english: "The food is very delicious", pronunciation: "KHAA-naa ba-HOOT swaa-DISHT hay", context: "Big compliment!", speakText: "Khana bahut swaadisht hai" }, { hindi: "मुझे मीठा पसंद है", roman: "Mujhe meetha pasand hai", english: "I like sweets", pronunciation: "MUJ-hay MEE-taa puh-SUND hay", context: "Preference", speakText: "Mujhe meetha pasand hai" }, { hindi: "और रोटी दीजिए", roman: "Aur roti dijiye", english: "Please give more roti", pronunciation: "owr ROH-tee DEE-ji-yay", context: "Polite request", speakText: "Aur roti dijiye" }], funFact: "You can now talk about food, tastes, and meals!", practice: "At your next meal, try to use only Hindi!" },
      "w8-verbs-sitstand": { id: "w8-verbs-sitstand", title: "Sit, Stand, Wait", category: "Verbs", icon: "🪑", phrases: [{ hindi: "बैठो", roman: "Baitho", english: "Sit (friendly)", pronunciation: "BAYTH-oh", context: "Command", speakText: "Baitho" }, { hindi: "बैठिए", roman: "Baithiye", english: "Please sit (respectful)", pronunciation: "bayth-I-yay", context: "For elders", speakText: "Baithiye" }, { hindi: "खड़े हो जाओ", roman: "Khade ho jao", english: "Stand up", pronunciation: "KHA-day ho JAA-oh", context: "Command", speakText: "Khade ho jao" }, { hindi: "रुको", roman: "Ruko", english: "Wait / Stop", pronunciation: "ROO-koh", context: "Friendly", speakText: "Ruko" }, { hindi: "रुकिए", roman: "Rukiye", english: "Please wait (respectful)", pronunciation: "roo-KI-yay", context: "For elders", speakText: "Rukiye" }], funFact: "Pattern: -o endings are friendly, -iye endings are respectful!", practice: "Offer a seat to an elder: Baithiye!" },
      "w8-verbs-looksee": { id: "w8-verbs-looksee", title: "Look, See, Listen", category: "Verbs", icon: "👀", phrases: [{ hindi: "देखो", roman: "Dekho", english: "Look / See (friendly)", pronunciation: "DAY-koh", context: "Friendly", speakText: "Dekho" }, { hindi: "देखिए", roman: "Dekhiye", english: "Please look (respectful)", pronunciation: "day-KHI-yay", context: "For elders", speakText: "Dekhiye" }, { hindi: "सुनो", roman: "Suno", english: "Listen (friendly)", pronunciation: "SOO-noh", context: "Friendly", speakText: "Suno" }, { hindi: "सुनिए", roman: "Suniye", english: "Please listen (respectful)", pronunciation: "soo-NI-yay", context: "For elders", speakText: "Suniye" }, { hindi: "यह देखो!", roman: "Yeh dekho!", english: "Look at this!", pronunciation: "yeh DAY-koh", context: "Showing something", speakText: "Yeh dekho" }], funFact: "Suno and Suniye are used to get someones attention!", practice: "Get attention: Suniye, yeh dekhiye!" },
      "w8-verbs-speakread": { id: "w8-verbs-speakread", title: "Speak, Read, Write", category: "Verbs", icon: "🗣️", phrases: [{ hindi: "बोलो", roman: "Bolo", english: "Speak / Say (friendly)", pronunciation: "BOH-loh", context: "Friendly", speakText: "Bolo" }, { hindi: "बोलिए", roman: "Boliye", english: "Please speak (respectful)", pronunciation: "boh-LI-yay", context: "For elders", speakText: "Boliye" }, { hindi: "पढ़ो", roman: "Padho", english: "Read / Study", pronunciation: "PUH-doh", context: "Both meanings!", speakText: "Padho" }, { hindi: "लिखो", roman: "Likho", english: "Write", pronunciation: "LI-koh", context: "Writing", speakText: "Likho" }, { hindi: "फिर से बोलिए", roman: "Phir se boliye", english: "Please say it again", pronunciation: "fir say boh-LI-yay", context: "Didnt understand", speakText: "Phir se boliye" }], funFact: "Padho means both read and study!", practice: "When you dont understand: Phir se boliye!" },
      "w8-verbs-dontdo": { id: "w8-verbs-dontdo", title: "Dont Do That!", category: "Verbs", icon: "🚫", phrases: [{ hindi: "मत करो", roman: "Mat karo", english: "Dont do that", pronunciation: "mut KUH-roh", context: "Prohibition", speakText: "Mat karo" }, { hindi: "मत जाओ", roman: "Mat jao", english: "Dont go", pronunciation: "mut JAA-oh", context: "Stay here!", speakText: "Mat jao" }, { hindi: "चिंता मत करो", roman: "Chinta mat karo", english: "Dont worry", pronunciation: "CHIN-taa mut KUH-roh", context: "Reassurance", speakText: "Chinta mat karo" }, { hindi: "ऐसा मत बोलो", roman: "Aisa mat bolo", english: "Dont say that", pronunciation: "AY-saa mut BOH-loh", context: "Disagreement", speakText: "Aisa mat bolo" }], funFact: "Mat before a verb makes it negative!", practice: "Reassure someone: Chinta mat karo, sab theek hai!" },
      "w8-verbs-doing": { id: "w8-verbs-doing", title: "What Are You Doing?", category: "Verbs", icon: "🤔", phrases: [{ hindi: "क्या कर रहे हो?", roman: "Kya kar rahe ho?", english: "What are you doing? (friendly)", pronunciation: "kyaa kur RAH-hay ho", context: "To friends", speakText: "Kya kar rahe ho" }, { hindi: "क्या कर रहे हैं?", roman: "Kya kar rahe hain?", english: "What are you doing? (respectful)", pronunciation: "kyaa kur RAH-hay hayn", context: "To elders", speakText: "Kya kar rahe hain" }, { hindi: "मैं खाना बना रहा हूँ", roman: "Main khana bana raha hoon", english: "I am cooking (male)", pronunciation: "mayn KHAA-naa buh-NAA RAH-ha hoon", context: "Present continuous", speakText: "Main khana bana raha hoon" }, { hindi: "मैं पढ़ रही हूँ", roman: "Main padh rahi hoon", english: "I am studying (female)", pronunciation: "mayn pudh RAH-hee hoon", context: "Present continuous", speakText: "Main padh rahi hoon" }], funFact: "Raha/rahi/rahe shows something is happening NOW like -ing!", practice: "Answer Kya kar rahe ho? with what youre actually doing!" },
      "w8-verbs-helping": { id: "w8-verbs-helping", title: "Helping & Asking", category: "Verbs", icon: "🤝", phrases: [{ hindi: "मदद करो", roman: "Madad karo", english: "Help (friendly)", pronunciation: "MUH-dud KUH-roh", context: "Asking for help", speakText: "Madad karo" }, { hindi: "मदद कीजिए", roman: "Madad kijiye", english: "Please help (respectful)", pronunciation: "MUH-dud KEE-ji-yay", context: "Polite request", speakText: "Madad kijiye" }, { hindi: "मुझे मदद चाहिए", roman: "Mujhe madad chahiye", english: "I need help", pronunciation: "MUJ-hay MUH-dud chaa-HI-yay", context: "Requesting help", speakText: "Mujhe madad chahiye" }, { hindi: "क्या मैं मदद कर सकता हूँ?", roman: "Kya main madad kar sakta hoon?", english: "Can I help? (male)", pronunciation: "kyaa mayn MUH-dud kur SUK-taa hoon", context: "Offering help", speakText: "Kya main madad kar sakta hoon" }], funFact: "Sakta/sakti means can or able to!", practice: "Offer help: Kya main madad kar sakta/sakti hoon?" },
      "w8-review": { id: "w8-review", title: "Week 8 Review", category: "Review", icon: "⭐", phrases: [{ hindi: "यहाँ बैठिए", roman: "Yahan baithiye", english: "Please sit here", pronunciation: "ya-HAAN bayth-I-yay", context: "Offering seat", speakText: "Yahan baithiye" }, { hindi: "चिंता मत करो", roman: "Chinta mat karo", english: "Dont worry", pronunciation: "CHIN-taa mut KUH-roh", context: "Reassurance", speakText: "Chinta mat karo" }, { hindi: "धीरे बोलिए", roman: "Dheere boliye", english: "Please speak slowly", pronunciation: "DEE-ray boh-LI-yay", context: "Language learner!", speakText: "Dheere boliye" }], funFact: "You now know commands, requests, and ongoing actions!", practice: "Use Dheere boliye - your best friend as a learner!" },
      "w9-past-basic": { id: "w9-past-basic", title: "Past Tense Basics", category: "Grammar", icon: "⏮️", phrases: [{ hindi: "मैं गया/गयी", roman: "Main gaya/gayi", english: "I went (m/f)", pronunciation: "mayn GUH-ya/GUH-yee", context: "Past tense", speakText: "Main gaya" }, { hindi: "मैंने खाया", roman: "Maine khaya", english: "I ate", pronunciation: "MAY-nay KHAA-ya", context: "Past tense", speakText: "Maine khaya" }, { hindi: "मैंने देखा", roman: "Maine dekha", english: "I saw", pronunciation: "MAY-nay DAY-khaa", context: "Past tense", speakText: "Maine dekha" }, { hindi: "मैंने किया", roman: "Maine kiya", english: "I did", pronunciation: "MAY-nay KI-ya", context: "Past tense", speakText: "Maine kiya" }], funFact: "Hindi past tense changes based on the verb AND sometimes gender!", practice: "Describe your day: 'Maine naashta khaya'!" },
      "w9-past-questions": { id: "w9-past-questions", title: "What Did You Do?", category: "Grammar", icon: "❓", phrases: [{ hindi: "क्या हुआ?", roman: "Kya hua?", english: "What happened?", pronunciation: "kyaa HOO-ah", context: "You know this!", speakText: "Kya hua" }, { hindi: "कहाँ गये थे?", roman: "Kahan gaye the?", english: "Where did you go?", pronunciation: "ka-HAAN GUH-yay thay", context: "About past", speakText: "Kahan gaye the" }, { hindi: "क्या किया?", roman: "Kya kiya?", english: "What did you do?", pronunciation: "kyaa KI-ya", context: "About actions", speakText: "Kya kiya" }, { hindi: "कैसा रहा?", roman: "Kaisa raha?", english: "How was it?", pronunciation: "KAY-saa RAH-ha", context: "About experience", speakText: "Kaisa raha" }], funFact: "'Kaisa raha?' is perfect for asking about trips, meals, movies!", practice: "Ask family: 'Aaj kya kiya?' and 'Kaisa raha?'" },
      "w9-shopping-basics": { id: "w9-shopping-basics", title: "Shopping Basics", category: "Shopping", icon: "🛍️", phrases: [{ hindi: "कितने का है?", roman: "Kitne ka hai?", english: "How much is it? (masculine)", pronunciation: "KIT-nay kaa hay", context: "Asking price", speakText: "Kitne ka hai" }, { hindi: "कितने की है?", roman: "Kitne ki hai?", english: "How much is it? (feminine)", pronunciation: "KIT-nay kee hay", context: "Asking price", speakText: "Kitne ki hai" }, { hindi: "बहुत महंगा है", roman: "Bahut mahanga hai", english: "It's very expensive", pronunciation: "ba-HOOT muh-HUN-gaa hay", context: "Expensive!", speakText: "Bahut mahanga hai" }, { hindi: "सस्ता है", roman: "Sasta hai", english: "It's cheap", pronunciation: "SUS-taa hay", context: "Affordable", speakText: "Sasta hai" }], funFact: "Bargaining is common in Indian markets! 'Bahut mahanga hai' is your opening move.", practice: "Point at objects: 'Kitne ka hai?' then react with 'Mahanga!' or 'Sasta!'" },
      "w9-shopping-numbers": { id: "w9-shopping-numbers", title: "Money Numbers", category: "Shopping", icon: "💰", phrases: [{ hindi: "रुपये", roman: "Rupaye", english: "Rupees", pronunciation: "roo-PUH-yay", context: "Indian currency", speakText: "Rupaye" }, { hindi: "सौ", roman: "Sau", english: "Hundred (100)", pronunciation: "sow", context: "100", speakText: "Sau" }, { hindi: "दो सौ", roman: "Do sau", english: "Two hundred (200)", pronunciation: "doh sow", context: "200", speakText: "Do sau" }, { hindi: "पाँच सौ", roman: "Paanch sau", english: "Five hundred (500)", pronunciation: "paanch sow", context: "500", speakText: "Paanch sau" }, { hindi: "हज़ार", roman: "Hazaar", english: "Thousand (1000)", pronunciation: "huh-ZAAR", context: "1000", speakText: "Hazaar" }], funFact: "Common prices: 'Sau rupaye' (₹100), 'Do sau pachaas' (₹250)!", practice: "Practice: 'Sau', 'Do sau', 'Teen sau', up to 'Das sau'!" },
      "w9-shopping-phrases": { id: "w9-shopping-phrases", title: "Shopping Phrases", category: "Shopping", icon: "🏪", phrases: [{ hindi: "यह दिखाइए", roman: "Yeh dikhaiye", english: "Please show me this", pronunciation: "yeh dik-HAI-yay", context: "Requesting", speakText: "Yeh dikhaiye" }, { hindi: "और कुछ?", roman: "Aur kuch?", english: "Anything else?", pronunciation: "owr kuch", context: "Shopkeeper asks", speakText: "Aur kuch" }, { hindi: "बस इतना ही", roman: "Bas itna hi", english: "That's all", pronunciation: "bus IT-naa hee", context: "Nothing more", speakText: "Bas itna hi" }, { hindi: "पैसे", roman: "Paise", english: "Money / Change", pronunciation: "PAY-say", context: "Cash", speakText: "Paise" }], funFact: "'Aur kuch?' is what shopkeepers always ask. Reply with 'Bas itna hi'!", practice: "Role-play: 'Yeh dikhaiye... Kitne ka hai?... Bas itna hi.'" },
      "w9-shopping-bargain": { id: "w9-shopping-bargain", title: "Bargaining", category: "Shopping", icon: "🤝", phrases: [{ hindi: "कम कीजिए", roman: "Kam kijiye", english: "Please reduce (the price)", pronunciation: "kum KEE-ji-yay", context: "Bargaining!", speakText: "Kam kijiye" }, { hindi: "सही दाम बताइए", roman: "Sahi daam bataiye", english: "Tell me the real price", pronunciation: "suh-HEE daam buh-TAI-yay", context: "Negotiating", speakText: "Sahi daam bataiye" }, { hindi: "ठीक है, ले लो", roman: "Theek hai, le lo", english: "OK, take it (final offer)", pronunciation: "teek hay, lay loh", context: "Agreeing", speakText: "Theek hai, le lo" }, { hindi: "नहीं चाहिए", roman: "Nahin chahiye", english: "I don't want it", pronunciation: "na-HEEN chaa-HI-yay", context: "Walking away", speakText: "Nahin chahiye" }], funFact: "Walking away saying 'Nahin chahiye' often gets you a better price!", practice: "Practice the bargaining dance: Ask price → 'Bahut mahanga!' → 'Kam kijiye' → Walk away if needed!" },
      "w9-review": { id: "w9-review", title: "Week 9 Review", category: "Review", icon: "⭐", phrases: [{ hindi: "कल मैं बाज़ार गया", roman: "Kal main bazaar gaya", english: "Yesterday I went to the market", pronunciation: "kul mayn baa-ZAAR GUH-ya", context: "Past tense!", speakText: "Kal main bazaar gaya" }, { hindi: "यह कितने का है? बहुत महंगा!", roman: "Yeh kitne ka hai? Bahut mahanga!", english: "How much? Very expensive!", pronunciation: "yeh KIT-nay kaa hay? ba-HOOT muh-HUN-gaa", context: "Shopping", speakText: "Yeh kitne ka hai? Bahut mahanga!" }, { hindi: "कम कीजिए, सौ रुपये दूँगा", roman: "Kam kijiye, sau rupaye dunga", english: "Please reduce, I'll give 100", pronunciation: "kum KEE-ji-yay, sow roo-PUH-yay DOON-gaa", context: "Bargaining!", speakText: "Kam kijiye, sau rupaye dunga" }], funFact: "You can now talk about the past AND go shopping in Hindi!", practice: "Describe a past shopping trip: 'Main bazaar gaya. Bahut cheezein dekhin!'" },
      "w10-weather": { id: "w10-weather", title: "Weather", category: "Weather", icon: "🌤️", phrases: [{ hindi: "आज मौसम कैसा है?", roman: "Aaj mausam kaisa hai?", english: "How's the weather today?", pronunciation: "aaj MOW-sum KAY-saa hay", context: "Weather chat", speakText: "Aaj mausam kaisa hai" }, { hindi: "गर्मी है", roman: "Garmi hai", english: "It's hot", pronunciation: "GUR-mee hay", context: "Hot weather", speakText: "Garmi hai" }, { hindi: "सर्दी है", roman: "Sardi hai", english: "It's cold", pronunciation: "SUR-dee hay", context: "Cold weather", speakText: "Sardi hai" }, { hindi: "बारिश हो रही है", roman: "Baarish ho rahi hai", english: "It's raining", pronunciation: "BAA-rish ho RAH-hee hay", context: "Rainy!", speakText: "Baarish ho rahi hai" }, { hindi: "धूप है", roman: "Dhoop hai", english: "It's sunny", pronunciation: "dhoop hay", context: "Sunny", speakText: "Dhoop hai" }], funFact: "'Bahut garmi hai!' (Very hot!) — you'll say this a lot in Indian summer!", practice: "Check the weather and describe it: 'Aaj bahut garmi hai!'" },
      "w10-body-basic": { id: "w10-body-basic", title: "Body Parts", category: "Body", icon: "🫀", phrases: [{ hindi: "सिर", roman: "Sir", english: "Head", pronunciation: "sir", context: "Body part", speakText: "Sir" }, { hindi: "पेट", roman: "Pet", english: "Stomach", pronunciation: "payt", context: "Body part", speakText: "Pet" }, { hindi: "हाथ", roman: "Haath", english: "Hand", pronunciation: "haath", context: "Body part", speakText: "Haath" }, { hindi: "पैर", roman: "Pair", english: "Foot / Leg", pronunciation: "pyre", context: "Body part", speakText: "Pair" }, { hindi: "आँख", roman: "Aankh", english: "Eye", pronunciation: "aankh", context: "Body part", speakText: "Aankh" }], funFact: "Touching elders' feet ('pair chhuna') is a sign of respect in Indian culture!", practice: "Point to body parts: 'Yeh mera sir hai, yeh mera haath hai!'" },
      "w10-health": { id: "w10-health", title: "Health & Pain", category: "Health", icon: "🏥", phrases: [{ hindi: "मुझे दर्द हो रहा है", roman: "Mujhe dard ho raha hai", english: "I'm having pain", pronunciation: "MUJ-hay durd ho RAH-ha hay", context: "General pain", speakText: "Mujhe dard ho raha hai" }, { hindi: "सिर में दर्द है", roman: "Sir mein dard hai", english: "I have a headache", pronunciation: "sir mayn durd hay", context: "Headache", speakText: "Sir mein dard hai" }, { hindi: "पेट में दर्द है", roman: "Pet mein dard hai", english: "I have a stomachache", pronunciation: "payt mayn durd hay", context: "Stomachache", speakText: "Pet mein dard hai" }, { hindi: "तबीयत ठीक नहीं है", roman: "Tabiyat theek nahin hai", english: "I'm not feeling well", pronunciation: "tuh-BEE-yut teek na-HEEN hay", context: "Unwell", speakText: "Tabiyat theek nahin hai" }], funFact: "'Tabiyat kaisi hai?' is more specific than 'Kaise ho?'!", practice: "If unwell: 'Tabiyat theek nahin hai, mujhe aaram chahiye'!" },
      "w10-polite-advanced": { id: "w10-polite-advanced", title: "Advanced Politeness", category: "Conversation", icon: "🙏", phrases: [{ hindi: "आपका बहुत-बहुत शुक्रिया", roman: "Aapka bahut-bahut shukriya", english: "Thank you very very much", pronunciation: "AAP-kaa ba-HOOT ba-HOOT shuk-REE-ya", context: "Big thanks!", speakText: "Aapka bahut bahut shukriya" }, { hindi: "कोई बात नहीं, खुशी हुई", roman: "Koi baat nahin, khushi hui", english: "No problem, it was my pleasure", pronunciation: "koy baat na-HEEN, KHOO-shee HOO-ee", context: "Gracious response", speakText: "Koi baat nahin, khushi hui" }, { hindi: "आप बहुत अच्छे हैं", roman: "Aap bahut acche hain", english: "You are very kind", pronunciation: "aap ba-HOOT uch-CHAY hayn", context: "Compliment", speakText: "Aap bahut acche hain" }, { hindi: "भगवान आपको खुश रखे", roman: "Bhagwan aapko khush rakhe", english: "May God keep you happy", pronunciation: "BHUG-waan AAP-ko khoosh RAKH-ay", context: "Blessing", speakText: "Bhagwan aapko khush rakhe" }], funFact: "Indians often give blessings as thanks. Elders say 'Khush raho' (Stay happy)!", practice: "Thank someone: 'Aapka bahut-bahut shukriya, aap bahut acche hain!'" },
      "w10-conversations": { id: "w10-conversations", title: "Full Conversations", category: "Conversation", icon: "💬", phrases: [{ hindi: "बताइए, क्या हाल है?", roman: "Bataiye, kya haal hai?", english: "Tell me, how are things?", pronunciation: "buh-TAI-yay, kyaa haal hay", context: "Opening", speakText: "Bataiye, kya haal hai" }, { hindi: "सब कुशल मंगल है", roman: "Sab kushal mangal hai", english: "All is well", pronunciation: "sub KOO-shul MUN-gul hay", context: "Positive response", speakText: "Sab kushal mangal hai" }, { hindi: "घर में सब कैसे हैं?", roman: "Ghar mein sab kaise hain?", english: "How is everyone at home?", pronunciation: "gur mayn sub KAY-say hayn", context: "About family", speakText: "Ghar mein sab kaise hain" }, { hindi: "सब ठीक हैं, आपकी दुआ से", roman: "Sab theek hain, aapki dua se", english: "Everyone is fine, by your blessings", pronunciation: "sub teek hayn, AAP-kee DOO-ah say", context: "Gracious reply", speakText: "Sab theek hain, aapki dua se" }], funFact: "'Aapki dua se' (by your blessings) is a beautiful, humble way to respond!", practice: "Have a full greeting exchange with a relative!" },
      "w10-future": { id: "w10-future", title: "Future Plans", category: "Grammar", icon: "🔮", phrases: [{ hindi: "मैं आऊँगा/आऊँगी", roman: "Main aaunga/aaungi", english: "I will come (m/f)", pronunciation: "mayn aa-OON-gaa/aa-OON-gee", context: "Future tense", speakText: "Main aaunga" }, { hindi: "कब आओगे?", roman: "Kab aaoge?", english: "When will you come?", pronunciation: "kub AA-oh-gay", context: "You know this!", speakText: "Kab aaoge" }, { hindi: "जल्दी मिलेंगे", roman: "Jaldi milenge", english: "We'll meet soon", pronunciation: "JUL-dee mi-LEN-gay", context: "Goodbye", speakText: "Jaldi milenge" }, { hindi: "इंतज़ार करूँगा/करूँगी", roman: "Intezaar karunga/karungi", english: "I will wait (m/f)", pronunciation: "in-tay-ZAAR kuh-ROON-gaa", context: "Looking forward", speakText: "Intezaar karunga" }], funFact: "'-unga/-ungi' or '-enge' endings show future tense!", practice: "Make plans: 'Main kal aaunga' and 'Hum jaldi milenge'!" },
      "w10-final60": { id: "w10-final60", title: "60 Days Complete!", category: "Final", icon: "🏆", phrases: [{ hindi: "नमस्ते! आप कैसे हैं? सब कुशल मंगल?", roman: "Namaste! Aap kaise hain? Sab kushal mangal?", english: "Hello! How are you? All well?", pronunciation: "nuh-MUS-tay! aap KAY-say hayn? sub KOO-shul MUN-gul", context: "Full greeting", speakText: "Namaste! Aap kaise hain? Sab kushal mangal?" }, { hindi: "हाँ जी, सब ठीक है। आपकी दुआ से।", roman: "Haan ji, sab theek hai. Aapki dua se.", english: "Yes, all is well. By your blessings.", pronunciation: "haahn jee, sub teek hay. AAP-kee DOO-ah say", context: "Gracious reply", speakText: "Haan ji, sab theek hai. Aapki dua se." }, { hindi: "बहुत अच्छा लगा बात करके। जल्दी मिलेंगे!", roman: "Bahut accha laga baat karke. Jaldi milenge!", english: "Great talking. See you soon!", pronunciation: "ba-HOOT uch-CHAA LUH-gaa baat KUR-kay. JUL-dee mi-LEN-gay", context: "Goodbye", speakText: "Bahut accha laga baat karke. Jaldi milenge!" }], funFact: "You've completed 60 days! You know 200+ phrases covering everything!", practice: "Call a relative in India and have a REAL conversation. You're ready! शाबाश (Shabaash)!" }

        { number: 4, title: "Week 4", subtitle: "Questions & Time", lessons: ["w4-questions-whatwhy", "w4-questions-whenwho", "w4-time-words", "w4-conversation-smalltalk", "w4-conversation-phone", "w4-emotions-feelings", "w4-review"] },
        { number: 5, title: "Week 5", subtitle: "Putting It Together", lessons: ["w5-phrases-useful", "w5-final"] },
        { number: 6, title: "Week 6", subtitle: "Numbers & Descriptions", lessons: ["w6-numbers-11to15", "w6-numbers-16to20", "w6-descriptions-bigsmall", "w6-descriptions-goodbad", "w6-descriptions-hotcold", "w6-colours-basic", "w6-review"] },
        { number: 7, title: "Week 7", subtitle: "Food & Tastes", lessons: ["w7-food-meals", "w7-food-dishes", "w7-food-tastes", "w7-food-more", "w7-food-requests", "w7-drinks", "w7-review"] },
        { number: 8, title: "Week 8", subtitle: "Verbs & Actions", lessons: ["w8-verbs-sitstand", "w8-verbs-looksee", "w8-verbs-speakread", "w8-verbs-dontdo", "w8-verbs-doing", "w8-verbs-helping", "w8-review"] },
        { number: 9, title: "Week 9", subtitle: "Past Tense & Shopping", lessons: ["w9-past-basic", "w9-past-questions", "w9-shopping-basics", "w9-shopping-numbers", "w9-shopping-phrases", "w9-shopping-bargain", "w9-review"] },
        { number: 10, title: "Week 10", subtitle: "Weather, Health & Wrap-up", lessons: ["w10-weather", "w10-body-basic", "w10-health", "w10-polite-advanced", "w10-conversations", "w10-future", "w10-final60"] }
      ]
    };

    function getAllLessonIds() {
      const ids = [];
      courseStructure.weeks.forEach(week => { week.lessons.forEach(id => ids.push(id)); });
      return ids;
    }
    function getTotalLessons() { return getAllLessonIds().length; }
    function getLessonIndex(lessonId) { return getAllLessonIds().indexOf(lessonId); }
    function getPreviousLessonId(lessonId) {
      const allIds = getAllLessonIds();
      const index = allIds.indexOf(lessonId);
      return index > 0 ? allIds[index - 1] : null;
    }

    let state = {
      currentView: 'home',
      currentWeek: 1,
      currentLessonId: null,
      completedLessons: [],
      quizState: { questions: [], currentQuestion: 0, score: 0, answered: false, selectedAnswer: null, showResult: false }
    };

    function saveProgress() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ version: COURSE_VERSION, completedLessons: state.completedLessons, savedAt: new Date().toISOString() }));
      } catch (e) { console.log('Could not save:', e); }
    }

    function loadProgress() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const data = JSON.parse(saved);
          if (data.completedDays && !data.completedLessons) {
            const allIds = getAllLessonIds();
            state.completedLessons = data.completedDays.map(d => allIds[d-1]).filter(Boolean);
            saveProgress();
          } else if (data.completedLessons) {
            state.completedLessons = data.completedLessons.filter(id => lessonDatabase[id]);
          }
        }
      } catch (e) { console.log('Could not load:', e); }
    }

    function speak(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'hi-IN';
        utterance.rate = 0.8;
        const voices = window.speechSynthesis.getVoices();
        const hindiVoice = voices.find(v => v.lang.includes('hi'));
        if (hindiVoice) utterance.voice = hindiVoice;
        window.speechSynthesis.speak(utterance);
      }
    }
    if ('speechSynthesis' in window) { window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices(); }

    function render() {
      updateProgress();
      renderWeekTabs();
      if (state.currentView === 'home') {
        document.getElementById('homeView').classList.remove('hidden');
        document.getElementById('lessonView').classList.remove('active');
        renderDaysGrid();
      } else {
        document.getElementById('homeView').classList.add('hidden');
        document.getElementById('lessonView').classList.add('active');
        renderLesson();
      }
      document.getElementById('tagline').textContent = courseStructure.description;
      document.getElementById('versionInfo').textContent = 'v' + COURSE_VERSION + ' • ' + getTotalLessons() + ' lessons';
      
      // Hide scroll hint if Week 5+ is visible
      const hint = document.getElementById('scrollHint');
      if (state.currentWeek >= 6) hint.style.display = 'none';
      else hint.style.display = 'block';
    }

    function updateProgress() {
      const completed = state.completedLessons.length;
      const total = getTotalLessons();
      document.getElementById('progressStats').textContent = completed + '/' + total + ' days';
      document.getElementById('progressFill').style.width = ((completed / total) * 100) + '%';
    }

    function renderWeekTabs() {
      const container = document.getElementById('weekTabs');
      let html = '';
      courseStructure.weeks.forEach(week => {
        html += '<button class="week-tab ' + (week.number === state.currentWeek ? 'active' : '') + '" onclick="switchWeek(' + week.number + ')">' + week.title + '</button>';
      });
      container.innerHTML = html;
    }

    function renderDaysGrid() {
      const grid = document.getElementById('daysGrid');
      const currentWeekData = courseStructure.weeks.find(w => w.number === state.currentWeek);
      if (!currentWeekData) { grid.innerHTML = '<p>Week not found</p>'; return; }
      let html = '';
      currentWeekData.lessons.forEach(lessonId => {
        const lesson = lessonDatabase[lessonId];
        if (!lesson) return;
        const dayNumber = getLessonIndex(lessonId) + 1;
        const isCompleted = state.completedLessons.includes(lessonId);
        const previousLessonId = getPreviousLessonId(lessonId);
        const previousCompleted = !previousLessonId || state.completedLessons.includes(previousLessonId);
        // All lessons unlocked - no sequential requirement
        const isCurrent = !isCompleted;
        html += '<div class="day-card ' + (isCompleted ? 'completed' : '') + '" onclick="openLesson(\'' + lessonId + '\')">' +
          '<div class="day-icon">' + lesson.icon + '</div>' +
          '<div class="day-info"><div class="day-number">Day ' + dayNumber + '</div><div class="day-title">' + lesson.title + '</div></div>' +
          '<div class="day-status ' + (isCompleted ? 'completed' : '') + ' ' + (isCurrent ? 'current' : '') + '">' + (isCompleted ? '✓' : '→') + '</div></div>';
      });
      grid.innerHTML = html;
    }

    function renderLesson() {
      const lesson = lessonDatabase[state.currentLessonId];
      if (!lesson) return;
      document.getElementById('lessonIcon').textContent = lesson.icon;
      document.getElementById('lessonTitle').textContent = lesson.title;
      document.getElementById('lessonCategory').textContent = lesson.category;
      document.getElementById('funFactText').textContent = lesson.funFact;
      document.getElementById('practiceText').textContent = lesson.practice;
      let phrasesHtml = '';
      lesson.phrases.forEach(phrase => {
        // Use Hindi script for speech synthesis (works better than romanized)
        const hindiText = phrase.hindi.replace(/'/g, "\\'");
        phrasesHtml += '<div class="phrase-card" onclick="speak(\'' + hindiText + '\')"><div class="phrase-main"><div><div class="phrase-hindi hindi">' + phrase.hindi + '</div><div class="phrase-roman">' + phrase.roman + '</div></div><button class="phrase-speak" onclick="event.stopPropagation(); speak(\'' + hindiText + '\')">🔊</button></div><div class="phrase-english">' + phrase.english + '</div><div class="phrase-meta"><span class="phrase-pronunciation">' + phrase.pronunciation + '</span><span class="phrase-context">' + phrase.context + '</span></div></div>';
      });
      document.getElementById('phrasesList').innerHTML = phrasesHtml;
      resetQuiz();
      switchTab('learn');
    }

    function generateQuiz() {
      const lesson = lessonDatabase[state.currentLessonId];
      if (!lesson) return [];
      const questions = [];
      const phrases = [...lesson.phrases];
      const numQuestions = Math.min(4, phrases.length);
      for (let i = 0; i < numQuestions; i++) {
        const phrase = phrases[i];
        const isHindiToEnglish = Math.random() > 0.5;
        const otherPhrases = phrases.filter((_, idx) => idx !== i);
        const wrongAnswers = otherPhrases.slice(0, 3).map(p => isHindiToEnglish ? p.english : p.roman);
        const genericWrong = isHindiToEnglish ? ['Good morning', 'Thank you', 'Goodbye', 'I am fine', 'Where is it?'] : ['Namaste', 'Shukriya', 'Theek hai', 'Bahut accha', 'Kya hua'];
        while (wrongAnswers.length < 3) {
          const wrong = genericWrong[Math.floor(Math.random() * genericWrong.length)];
          if (!wrongAnswers.includes(wrong) && wrong !== (isHindiToEnglish ? phrase.english : phrase.roman)) wrongAnswers.push(wrong);
        }
        const correctAnswer = isHindiToEnglish ? phrase.english : phrase.roman;
        const allAnswers = [correctAnswer, ...wrongAnswers.slice(0, 3)].sort(() => Math.random() - 0.5);
        questions.push({ question: isHindiToEnglish ? phrase.roman : phrase.english, prompt: isHindiToEnglish ? 'What does this mean?' : 'How do you say this in Hindi?', options: allAnswers, correct: correctAnswer, hindi: phrase.hindi, speakText: phrase.speakText });
      }
      return questions;
    }

    function resetQuiz() { state.quizState = { questions: generateQuiz(), currentQuestion: 0, score: 0, answered: false, selectedAnswer: null, showResult: false }; }

    function renderQuiz() {
      const { questions, currentQuestion, score, answered, selectedAnswer, showResult } = state.quizState;
      const quizContent = document.getElementById('quizContent');
      const quizProgress = document.getElementById('quizProgress');
      let progressHtml = '';
      for (let i = 0; i < questions.length; i++) {
        let dotClass = i < currentQuestion ? 'answered' : (i === currentQuestion && !showResult ? 'current' : (showResult ? 'answered' : ''));
        progressHtml += '<div class="quiz-dot ' + dotClass + '"></div>';
      }
      quizProgress.innerHTML = progressHtml;
      if (showResult) {
        const percent = questions.length > 0 ? Math.round((score / questions.length) * 100) : 0;
        let message = percent === 100 ? 'Perfect! Bahut badhiya! 🌟' : percent >= 75 ? 'Great job! Keep it up!' : percent >= 50 ? 'Good effort! Practice more!' : 'Keep practicing!';
        const dayNumber = getLessonIndex(state.currentLessonId) + 1;
        quizContent.innerHTML = '<div class="quiz-result"><div class="quiz-score">' + score + '/' + questions.length + '</div><p class="quiz-message">' + message + '</p></div><button class="btn btn-primary" onclick="completeLesson()">Complete Day ' + dayNumber + ' ✓</button><button class="btn btn-secondary" style="margin-top: 10px" onclick="retryQuiz()">Try Again</button>';
        return;
      }
      if (questions.length === 0) {
        quizContent.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">No quiz for this lesson.</p><button class="btn btn-primary" style="margin-top: 20px" onclick="completeLesson()">Complete Lesson ✓</button>';
        return;
      }
      const q = questions[currentQuestion];
      if (!q) return;
      let optionsHtml = '';
      q.options.forEach(option => {
        let optionClass = answered ? (option === q.correct ? 'correct' : (option === selectedAnswer ? 'incorrect' : '')) : (option === selectedAnswer ? 'selected' : '');
        const escapedOption = option.replace(/'/g, "\\'");
        optionsHtml += '<button class="quiz-option ' + optionClass + '" onclick="selectAnswer(\'' + escapedOption + '\')" ' + (answered ? 'disabled' : '') + '>' + option + '</button>';
      });
      quizContent.innerHTML = '<div class="quiz-question">' + q.question + '</div><p class="quiz-prompt">' + q.prompt + '</p><div class="quiz-options">' + optionsHtml + '</div>' + (answered ? '<button class="btn btn-primary" style="margin-top: 20px" onclick="nextQuestion()">' + (currentQuestion < questions.length - 1 ? 'Next Question →' : 'See Results') + '</button>' : '');
    }

    function selectAnswer(answer) {
      if (state.quizState.answered) return;
      state.quizState.selectedAnswer = answer;
      state.quizState.answered = true;
      if (answer === state.quizState.questions[state.quizState.currentQuestion].correct) state.quizState.score++;
      renderQuiz();
    }

    function nextQuestion() {
      if (state.quizState.currentQuestion < state.quizState.questions.length - 1) {
        state.quizState.currentQuestion++;
        state.quizState.answered = false;
        state.quizState.selectedAnswer = null;
      } else { state.quizState.showResult = true; }
      renderQuiz();
    }

    function retryQuiz() { resetQuiz(); renderQuiz(); }

    function completeLesson() {
      if (!state.completedLessons.includes(state.currentLessonId)) {
        state.completedLessons.push(state.currentLessonId);
        saveProgress();
      }
      goHome();
    }

    function openLesson(lessonId) {
      if (!lessonDatabase[lessonId]) return;
      state.currentLessonId = lessonId;
      state.currentView = 'lesson';
      render();
      window.scrollTo(0, 0);
    }

    function goHome() { state.currentView = 'home'; state.currentLessonId = null; render(); }

    function switchTab(tabName) {
      document.querySelectorAll('.lesson-tab').forEach(tab => { tab.classList.toggle('active', tab.dataset.tab === tabName); });
      document.querySelectorAll('.tab-content').forEach(content => { content.classList.remove('active'); });
      if (tabName === 'learn') document.getElementById('learnTab').classList.add('active');
      else { document.getElementById('quizTab').classList.add('active'); renderQuiz(); }
    }

    function switchWeek(weekNumber) { state.currentWeek = weekNumber; render(); }

    document.getElementById('backBtn').addEventListener('click', goHome);
    document.getElementById('startQuizBtn').addEventListener('click', () => switchTab('quiz'));
    document.querySelectorAll('.lesson-tab').forEach(tab => { tab.addEventListener('click', () => switchTab(tab.dataset.tab)); });

    loadProgress();
    render();
  </script>
</body>
</html>
